# Azure Pipelines with multiple pre-configured manual jobs
# This lets reviewers pick a specific refactoring from the pipeline UI

# Required pipeline variables (configure in Pipelines → Library → Variable Groups):
#   CS_ACCESS_TOKEN    - CodeScene API access token
#   AZURE_TOKEN        - Azure DevOps PAT with Code (Read & Write) and Pull Request Threads (Read & Write) scopes
#   ANTHROPIC_API_KEY  - (or OPENAI_API_KEY / GOOGLE_API_KEY)

resources:
  repositories:
    - repository: cs-agent
      type: github
      name: codescene-oss/pr-refactoring-agent-azure
      ref: refs/tags/v1.0.0
      endpoint: <your-github-service-connection>

trigger: none

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: ubuntu-latest

jobs:
  # Fix complexity issues introduced by the PR
  - job: fix_complexity
    displayName: "CodeScene — Fix Complexity"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    steps:
      - checkout: self
        persistCredentials: true
      - template: refactoring-agent.yml@cs-agent
        parameters:
          command: "skill:fix-code-health-degradations improve complexity"
          model: "anthropic/claude-sonnet-4-20250514"

  # Fix security issues introduced by the PR
  - job: fix_security
    displayName: "CodeScene — Fix Security"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    steps:
      - checkout: self
        persistCredentials: true
      - template: refactoring-agent.yml@cs-agent
        parameters:
          command: "skill:fix-code-health-degradations improve security"
          model: "anthropic/claude-sonnet-4-20250514"

  # Improve readability of files touched by the PR
  - job: improve_readability
    displayName: "CodeScene — Improve Readability"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    steps:
      - checkout: self
        persistCredentials: true
      - template: refactoring-agent.yml@cs-agent
        parameters:
          command: "skill:uplift-code-health improve readability"
          model: "anthropic/claude-sonnet-4-20250514"

  # Full refactoring — fix degradations and uplift code health
  - job: full_refactoring
    displayName: "CodeScene — Full Refactoring"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    steps:
      - checkout: self
        persistCredentials: true
      - template: refactoring-agent.yml@cs-agent
        parameters:
          command: "skill:fix-code-health-degradations skill:uplift-code-health improve all aspects"
          model: "anthropic/claude-sonnet-4-20250514"

# Usage:
# 1. Open your pull request in Azure DevOps
# 2. Navigate to the Checks / Pipelines tab
# 3. Click "Run" on the job you want to trigger
# 4. Wait for completion and check the PR thread for results
